.name{font-size:16px;font-weight:600;color:#111;margin-bottom:4px;line-height:1.3}
.row{display:flex;align-items:flex-start;gap:7px;margin-top:6px;line-height:1.5}
.ico{flex-shrink:0;font-size:14px;margin-top:1px}
.txt{font-size:13px;color:#555}
.txt a{color:#1565c0;text-decoration:none}
.tag{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;background:#ffebee;color:#b71c1c;margin-top:8px;font-weight:500}
.empty{text-align:center;padding:60px 20px;color:#bbb}
.empty-icon{font-size:40px;margin-bottom:12px}

const search=document.getElementById('search');
const xbtn=document.getElementById('xbtn');
const info=document.getElementById('info');
const list=document.getElementById('list');

search.addEventListener('input',()=>{
  xbtn.classList.toggle('show',!!search.value);
  run();
});

function clearQ(){
  search.value='';
  xbtn.classList.remove('show');
  search.focus();
  run();
}

function setOwner(v){
  ow=v;
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',c.dataset.val===v));
  run();
}

function hl(t,q){
  if(!q||!t)return String(t||'');
  const e=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return String(t).replace(new RegExp(e,'gi'),m=>`<mark>${m}</mark>`);
}

function run(){
  const q=search.value.trim();
  const lq=q.toLowerCase();

  let r=D;
  if(ow) r=r.filter(d=>d['負責人']===ow);
  if(q) r=r.filter(d=>

    String(d['地址']||'').toLowerCase().includes(lq)||
    String(d['電話號碼']||'').includes(q)

  const n=r.length;

  }

  const show=r.slice(0,300);
  list.innerHTML=show.map(d=>{

    const tel=d['電話號碼']||'';
    const own=d['負責人']||'';
    return `<div class="card">

      ${ad?`<div class="row"><span class="ico">📍</span><span class="txt">${ad}</span></div>`:''}
